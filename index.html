<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シュガーホリッカー・ラッシュ</title>
    <style>
        /* 1. リセットと基本設定 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* スクロール防止 */
            background-color: #ffb7c5; /* さくらピンク */
            font-family: 'Hiragino Rounded W8 ProN', 'Hiragino Maru Gothic ProN', 'Meiryo', 'Nunito', sans-serif;
            touch-action: none; /* ピンチズームやダブルタップズームを防止 */
        }

        /* 2. アプリ全体のコンテナとヘッダー */
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 60px;
            background-color: #fff;
            border-bottom: 3px solid #ff4081;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 20;
        }
        .header-score {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff4081;
        }
        .header-score span {
            font-size: 1.5rem;
        }

        /* 2.5 ゲームコンテナ */
        #game-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            background: radial-gradient(circle at center, #fff0f5 0%, #ffb7c5 100%);
            overflow: hidden;
        }

        /* 3. 画面の共通スタイル */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background-color: rgba(255, 183, 197, 0.85); /* 半透明のさくらピンク */
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }
        .hidden {
            display: none !important;
        }

        /* 4. タイポグラフィとUI要素 */
        h1 {
            color: #ff4081; /* アクセントピンク */
            text-shadow: 3px 3px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            padding: 0 10px;
            line-height: 1.2;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #ff4081;
            background: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(255,64,129,0.3);
        }
        p.instructions {
            color: #ff4081;
            font-weight: bold;
            background: #ffffff;
            padding: 15px 20px;
            border-radius: 20px;
            text-align: center;
            line-height: 1.8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px dashed #ffb7c5;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        h2 {
            color: #ff4081;
            text-shadow: 2px 2px 0 #fff;
            font-size: 2rem;
            margin: 10px 0;
        }
        h3#title-display {
            color: #fff;
            background: #ff4081;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.5rem;
            margin-bottom: 30px;
            border: 3px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .btn {
            background-color: #ff4081;
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 4px solid white;
            border-radius: 50px;
            box-shadow: 0 6px 0 #c2185b, 0 8px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
            letter-spacing: 2px;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #c2185b, 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 5. ゲーム内UI (ヘッダーへ移動済のため不要) */

        /* 6. 動的オブジェクト (角砂糖とケーキ) */
        .gameObject {
            position: absolute;
            font-size: 3.5rem; /* スマホでもタップしやすい大きさ */
            cursor: pointer;
            transform: translate(-50%, -50%); /* 中心座標を基準にする */
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
            z-index: 4;
            /* タップ領域を少し広げるためのハック */
            padding: 10px;
        }

        /* 7. タップ時のパーティクル演出 */
        .tapParticle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 6;
            transform: translate(-50%, -50%);
            animation: particleBurst 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes particleBurst {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
        }

        /* 8. 特別演出: 79Pt達成のメッセージ */
        #special-message {
            position: absolute;
            top: 30%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            color: #ff4081;
            text-shadow: 3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff;
            z-index: 100;
            pointer-events: none;
            font-weight: bold;
            line-height: 1.4;
            animation: popInBounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, floatPulsate 2s infinite 1s;
        }
        @keyframes popInBounce {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            80% { transform: scale(1.1) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        @keyframes floatPulsate {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-10px); }
            100% { transform: scale(1) translateY(0); }
        }

        /* 10. 誕生日モード背景とバナー */
        #game-container {
            transition: background 1s ease, box-shadow 1s ease;
        }
        #game-container.birthday-mode {
            background: radial-gradient(circle at center, #fff0f5 0%, #ff69b4 100%);
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.5);
        }
        .birthday-banner {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff4081, #ffd700);
            padding: 8px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 5;
            white-space: nowrap;
            border: 2px solid #fff;
            animation: slideDownFade 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideDownFade {
            0% { top: -50px; opacity: 0; transform: translateX(-50%) scale(0.8); }
            100% { top: 10px; opacity: 1; transform: translateX(-50%) scale(1); }
        }

        /* 9. 紙吹雪 */
        .confetti {
            position: absolute;
            top: -20px;
            width: 12px;
            height: 12px;
            background-color: #ff4081;
            pointer-events: none;
            z-index: 50;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(120vh) rotate(720deg); }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- ヘッダー（スコア表示） -->
        <div id="header">
            <div class="header-score">Best: <span id="best-score">0</span> Pt</div>
            <div class="header-score">Sugar: <span id="score">0</span> Pt</div>
        </div>
        
        <div id="game-container">
        <!-- スタート画面 -->
        <div id="start-screen" class="screen">
            <h1>シュガーホリッカー<br>ラッシュ</h1>
            <div class="subtitle">〜佐藤莉華 生誕祭〜</div>
            <p class="instructions">
                角砂糖をタップしてスコアを稼ごう！<br>
                画面外に逃がすとゲームオーバー！<br>
                ケーキは3Ptボーナス！逃してもOK！(24Pt〜)
            </p>
            <div class="btn" id="start-btn">スタート！</div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="game-over-screen" class="screen hidden">
            <h1>ゲームオーバー</h1>
            <h2>累計 Sugar Pt: <span id="final-score">0</span></h2>
            <h3 id="title-display"></h3>
            <div class="btn" id="retry-btn">もう一度遊ぶ</div>
        </div>
        </div>
    </div>

    <script>
        // --- 状態管理変数 ---
        let score = 0;
        let isPlaying = false;
        let gameLoopId;
        let spawnTimeoutId;
        let objects = [];
        let hasSeen79Effect = false;
        let hasLeveledUp = false;
        
        // --- 難易度パラメータ ---
        let baseSpawnRate = 800;  // 初期出現間隔 (ms) を早く
        let baseSpeed = 3;        // 初期移動速度 を早く

        // --- DOM要素の取得 ---
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const titleDisplay = document.getElementById('title-display');

        // --- ベストスコアの読み込み ---
        let bestScore = parseInt(localStorage.getItem('sugarHolickerBest')) || 0;
        bestScoreEl.innerText = bestScore;

        // --- ウィンドウサイズ管理 ---
        let screenW = window.innerWidth;
        let screenH = window.innerHeight;
        window.addEventListener('resize', () => {
            screenW = container.clientWidth;
            screenH = container.clientHeight;
        });

        // --- イベントリスナー設定 ---
        // pointerdownを使って、タッチとマウス両方に対応
        document.getElementById('start-btn').addEventListener('pointerdown', startGame);
        document.getElementById('retry-btn').addEventListener('pointerdown', startGame);

        // コンテナ上のデフォルトスクロール等をキャンセル
        container.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        // --- ゲーム開始処理 ---
        function startGame(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            // 画面サイズの再取得（ヘッダー分を引いた正確なサイズ）
            screenW = container.clientWidth;
            screenH = container.clientHeight;
            
            // 画面の切り替え
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            container.classList.remove('birthday-mode');
            
            // 既存のオブジェクトやエフェクトを全てクリア
            document.querySelectorAll('.gameObject, .tapParticle, .confetti, #special-message, .birthday-banner').forEach(el => el.remove());
            
            // 変数の初期化
            score = 0;
            scoreEl.innerText = score;
            isPlaying = true;
            hasSeen79Effect = false;
            hasLeveledUp = false;
            objects = [];
            
            // ループ開始
            lastTime = performance.now();
            gameLoopId = requestAnimationFrame(gameLoop);
            scheduleSpawn();
        }

        // --- メインゲームループ ---
        let lastTime = 0;
        function gameLoop(time) {
            if (!isPlaying) return;
            
            // const dt = time - lastTime; // （今回は経過時間厳密なデルタ計算ではなく、フレームベースの簡易物理）
            lastTime = time;

            // オブジェクトの移動処理
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                obj.x += obj.vx;
                obj.y += obj.vy;
                
                // DOMへの反映
                obj.el.style.left = obj.x + 'px';
                obj.el.style.top = obj.y + 'px';

                // 画面外判定
                const margin = 80; // 完全に画面外に出るまでのマージン
                if (
                    obj.x < -margin || obj.x > screenW + margin ||
                    obj.y < -margin || obj.y > screenH + margin
                ) {
                    if (obj.type === 'sugar') {
                        // 角砂糖を逃がしたらゲームオーバー
                        gameOver();
                        return; // ループを中断
                    } else {
                        // ケーキ（ボーナス）は逃がしてもセーフ。配列とDOMから削除するだけ
                        obj.el.remove();
                        objects.splice(i, 1);
                    }
                }
            }

            // 次のフレームを要求
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // --- 出現スケジューリング ---
        function scheduleSpawn() {
            if (!isPlaying) return;
            spawnObject();
            
            // 10ポイントごとに速度と頻度を上げる (レベル)
            let level = Math.floor(score / 10);
            // 最小間隔は300msに制限
            let currentSpawnRate = Math.max(300, baseSpawnRate - (level * 100));
            
            spawnTimeoutId = setTimeout(scheduleSpawn, currentSpawnRate);
        }

        // --- オブジェクトの生成 ---
        function spawnObject() {
            // 24Pt以上なら20%の確率でケーキ
            const isCake = (score >= 24) ? Math.random() < 0.2 : false;
            const type = isCake ? 'cake' : 'sugar';
            
            const el = document.createElement('div');
            el.className = 'gameObject';
            
            if (isCake) {
                el.innerHTML = '<img src="assets/cake.png" alt="cake" style="width: 55px; height: 55px; object-fit: contain; pointer-events: none;">';
            } else {
                el.innerHTML = '<img src="assets/sugar.png" alt="sugar" style="width: 65px; height: 65px; object-fit: contain; pointer-events: none;">';
            }
            
            // タップ（クリック）イベント
            el.addEventListener('pointerdown', (e) => {
                if (!isPlaying) return;
                e.preventDefault();
                e.stopPropagation();
                hitObject(obj, e.clientX, e.clientY);
            });

            container.appendChild(el);

            // 発生する辺をランダムに決定 (0:上, 1:右, 2:下, 3:左)
            const edge = Math.floor(Math.random() * 4);
            let x, y, targetX, targetY;
            const spawnMargin = 60; // 画面外の初期位置
            
            // 必ず画面の反対側の辺を目標にすることで、画面を横断するようにする
            if (edge === 0) { // 上から
                x = Math.random() * screenW;
                y = -spawnMargin;
                targetX = Math.random() * screenW;
                targetY = screenH + spawnMargin;
            } else if (edge === 1) { // 右から
                x = screenW + spawnMargin;
                y = Math.random() * screenH;
                targetX = -spawnMargin;
                targetY = Math.random() * screenH;
            } else if (edge === 2) { // 下から
                x = Math.random() * screenW;
                y = screenH + spawnMargin;
                targetX = Math.random() * screenW;
                targetY = -spawnMargin;
            } else { // 左から
                x = -spawnMargin;
                y = Math.random() * screenH;
                targetX = screenW + spawnMargin;
                targetY = Math.random() * screenH;
            }

            // 目標地点への角度を計算
            const angle = Math.atan2(targetY - y, targetX - x);

            // 10ポイントごとに速度を上げる
            let level = Math.floor(score / 10);
            let currentSpeed = baseSpeed + (level * 0.8);
            // 速度に多少のばらつきを持たせる (0.8倍〜1.2倍)
            currentSpeed *= (0.8 + Math.random() * 0.4);

            const obj = {
                el: el,
                type: type,
                x: x,
                y: y,
                vx: Math.cos(angle) * currentSpeed,
                vy: Math.sin(angle) * currentSpeed
            };

            // 初期位置の適用
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            
            objects.push(obj);
        }

        // --- タップ成功時の処理 ---
        function hitObject(obj, tapX, tapY) {
            // 配列とDOMから削除
            const index = objects.indexOf(obj);
            if (index > -1) objects.splice(index, 1);
            obj.el.remove();

            // スコア加算
            const pts = obj.type === 'cake' ? 3 : 1;
            score += pts;
            scoreEl.innerText = score;

            // 24Ptレベルアップ通知 & 背景変化
            if (score >= 24 && !hasLeveledUp) {
                hasLeveledUp = true;
                container.classList.add('birthday-mode');
                
                const banner = document.createElement('div');
                banner.className = 'birthday-banner';
                banner.innerHTML = "Level Up! 🎂 ケーキ解禁！";
                container.appendChild(banner);
                
                triggerConfetti(40);
            }

            // クラッカー風のパーティクル演出
            createTapParticles(tapX, tapY, obj.type);
        }

        // --- パーティクル生成 ---
        function createTapParticles(x, y, type) {
            const particleCount = type === 'cake' ? 12 : 6;
            const colors = type === 'cake' ? ['#ff4081', '#ffd700', '#ffffff', '#ffb7c5'] : ['#ffb7c5', '#ffffff'];
            
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'tapParticle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // 飛ぶ角度と距離をランダムに
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 50 + 20;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                
                container.appendChild(p);
                
                // アニメーション完了後に削除
                setTimeout(() => { p.remove(); }, 500);
            }
        }

        // --- ゲームオーバー処理 ---
        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(gameLoopId);
            clearTimeout(spawnTimeoutId);
            
            // 残っているオブジェクトの動きを止め、半透明にする
            objects.forEach(obj => {
                obj.el.style.pointerEvents = 'none';
                obj.el.style.opacity = '0.5';
                obj.el.style.transition = 'opacity 0.5s';
            });

            // 少し間を置いてからゲームオーバー画面を表示
            setTimeout(() => {
                gameOverScreen.classList.remove('hidden');
                finalScoreEl.innerText = score;
                
                // ベストスコアの更新
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('sugarHolickerBest', bestScore);
                    bestScoreEl.innerText = bestScore;
                }
                
                // 称号の判定
                let title = "";
                if (score <= 10) title = "微糖ホリッカー";
                else if (score <= 30) title = "中辛ホリッカー";
                else if (score <= 50) title = "本格シュガーホリッカー";
                else if (score <= 78) title = "重度佐藤中毒";
                else title = "極限の佐藤中毒（神ホリッカー）";
                
                titleDisplay.innerText = "称号: " + title;
                
                // 79Pt以上の場合はゲームオーバー画面でも特別演出を発動
                if (score >= 79 && !hasSeen79Effect) {
                    trigger79Effect();
                }
            }, 800);
        }

        // --- 79Pt到達時の特別演出 (誕生日) ---
        function trigger79Effect() {
            hasSeen79Effect = true;
            
            // 祝福メッセージの表示
            const msg = document.createElement('div');
            msg.id = 'special-message';
            msg.innerHTML = "🎉 Happy Birthday<br>莉華ちゃん！ 🎉";
            container.appendChild(msg);
            
            triggerConfetti(120);
        }

        // --- 紙吹雪の生成 ---
        function triggerConfetti(amount = 120) {
            const colors = ['#ff4081', '#ffb7c5', '#ffffff', '#ffd700', '#ff69b4', '#87cefa'];
            for(let i=0; i < amount; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // 丸か四角かランダム
                if (Math.random() > 0.5) conf.style.borderRadius = '50%';
                
                // 落下速度と開始タイミングをランダムに
                conf.style.animationDuration = (Math.random() * 3 + 2.5) + 's';
                conf.style.animationDelay = (Math.random() * 1.5) + 's';
                
                container.appendChild(conf);
            }
        }
    </script>
</body>
</html>
